description: >
  One Sanskrit verse can be translated three grammatical ways that disagree
  about the nature of reality. For fifteen centuries the commentary tradition
  has been the only referee. This book tells the story of the first machine
  verified translation of a Sanskrit classic: the complete first book of
  Bhartṛhari's Vākyapadīya, where every verse's accepted reading is proved
  adequate against its commentary in the Lean theorem prover, and 350
  plausible mistranslations are refuted by compiled theorems.
