description: >
  What if a translation could be checked the way software is checked? One
  verse of Sanskrit can be translated three grammatical ways that disagree
  about the nature of reality, and for fifteen centuries the commentary
  tradition has been the only referee. This book brings objective
  verification into that most subjective of arts. It tells the story of the
  complete first book of Bhartṛhari's Vākyapadīyam, the Brahmakāṇḍa, whose
  every verse now carries a reading proved adequate against its commentary
  in the Lean theorem prover, with 361 plausible mistranslations refuted by
  compiled theorems. Along the way it teaches, from first principles, the
  two traditions it joins: Pāṇini's grammar and the paramparā that carried
  it, and the dependent type theory that powers modern proof assistants,
  meeting in Navya-Nyāya, the formal logic India built centuries before
  formal logic had that name.
